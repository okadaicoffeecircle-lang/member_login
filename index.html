<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ゆげ 会員証</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Hina+Mincho&family=Shippori+Mincho:wght@400;500;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #F0EBE2;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Shippori Mincho', serif;
      padding: 2rem 1rem;
    }

    /* ── ログイン画面 ── */
    .login-wrap {
      width: 100%;
      max-width: 360px;
    }

    .login-title {
      font-family: 'Hina Mincho', serif;
      font-size: 13px;
      letter-spacing: 0.2em;
      color: #888;
      text-align: center;
      margin-bottom: 1.8rem;
    }

    .field { margin-bottom: 1rem; }

    .field label {
      display: block;
      font-size: 11px;
      letter-spacing: 0.12em;
      color: #888;
      margin-bottom: 6px;
    }

    .field input {
      width: 100%;
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      padding: 10px 14px;
      border: 0.5px solid #ccc;
      border-radius: 8px;
      background: #fff;
      color: #1a1a1a;
      outline: none;
      transition: border-color 0.2s;
    }

    .field input:focus { border-color: #999; }
    .field input::placeholder { color: #ccc; }

    .login-btn {
      width: 100%;
      padding: 11px;
      margin-top: 0.5rem;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: 'Shippori Mincho', serif;
      font-size: 13px;
      letter-spacing: 0.12em;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .login-btn:hover { opacity: 0.8; }

    .error-msg {
      font-size: 12px;
      color: #c0392b;
      margin-top: 10px;
      text-align: center;
      min-height: 18px;
    }

    /* ── カード画面 ── */
    .card-wrap { display: none; }
    .card-wrap.card-visible {
      display: block;
      width: min(98vw, calc(98vh * 420 / 265), 720px);
    }

    .card {
      width: 100%;
      aspect-ratio: 420 / 265;
      border-radius: 14px;
      overflow: hidden;
      display: flex;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    }

    /* 左パネル */
    .card-left {
      width: calc(100% / 3);
      flex-shrink: 0;
      background: #3A5C28;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 20px 12px;
    }

    .card { font-family: 'Hina Mincho', serif; }

    .left-title {
      font-family: 'Hina Mincho', serif;
      font-size: 22px;
      color: #F5E8C8;
      letter-spacing: 0.15em;
      text-align: center;
    }

    .left-circle {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      color: #8AAA60;
      letter-spacing: 0.28em;
      text-align: center;
    }

    .left-partner {
      font-family: 'DM Mono', monospace;
      font-size: 7px;
      color: #5A7A42;
      text-align: center;
    }

    /* 右パネル */
    .card-right {
      flex: 1;
      background: #FDF6EC;
      border: 0.5px solid #E8D4B0;
      border-left: none;
      padding: 22px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .right-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .right-top-label {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      color: #8C7E6E;
      letter-spacing: 0.25em;
    }

    .right-top-id {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: #A89880;
    }

    .right-middle {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 8px 0;
    }

    .member-name {
      font-family: 'Hina Mincho', serif;
      color: #2A1A08;
      margin-bottom: 4px;
      line-height: 1.2;
    }

    .member-role {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: #B07840;
      letter-spacing: 0.22em;
    }

    .right-bottom {
      border-top: 0.5px solid #E8D4B0;
      padding-top: 12px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    .bottom-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .bottom-label {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      color: #8C7E6E;
      letter-spacing: 0.18em;
    }

    .bottom-value {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: #2A1A08;
    }

    .clock-value {
      font-family: 'DM Mono', monospace;
      font-size: 18px;
      font-weight: 300;
      color: #2A1A08;
      letter-spacing: 0.06em;
    }

    .logout-btn {
      width: 100%;
      margin-top: 0.8rem;
      padding: 9px;
      background: transparent;
      border: 0.5px solid #C8B89A;
      border-radius: 8px;
      font-family: 'Hina Mincho', serif;
      font-size: 12px;
      letter-spacing: 0.12em;
      color: #8C7E6E;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .logout-btn:hover { border-color: #A89880; color: #555; }

    @media (max-width: 600px) {
      .card-wrap.card-visible {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .card {
        width: min(95vh, calc(95vw * 420 / 265));
        transform: rotate(90deg);
        transform-origin: center center;
      }
      .logout-btn {
        display: none;
      }
    }
  </style>
</head>
<body>

  <div class="login-wrap" id="loginWrap">
    <p class="login-title">ゆげ — MEMBER LOGIN</p>
    <div class="field">
      <label>名前</label>
      <input type="text" id="nameInput" placeholder="ヤマダタロウ"
        onfocus="this.placeholder=''" onblur="if(!this.value)this.placeholder='ヤマダタロウ'" />
    </div>
    <div class="field">
      <label>パスワード</label>
      <input type="password" id="passInput" placeholder="••••"
        onfocus="this.placeholder=''" onblur="if(!this.value)this.placeholder='••••'" />
    </div>
    <button class="login-btn" onclick="doLogin()">ログイン</button>
    <p class="error-msg" id="errorMsg"></p>
  </div>

  <div class="card-wrap" id="cardWrap">
    <div class="card">
      <!-- 左パネル -->
      <div class="card-left">
        <img src="rogo.PNG" width="48" height="64" alt="ゆげ" />
        <p class="left-title">ゆ げ</p>
        <p class="left-circle">COFFEE CIRCLE</p>
        <p class="left-partner">Partner / Empire Coffee</p>
      </div>
      <!-- 右パネル -->
      <div class="card-right">
        <div class="right-top">
          <span class="right-top-label">MEMBER CARD</span>
          <span class="right-top-id" id="displayId">NO. 001</span>
        </div>
        <div class="right-middle">
          <p class="member-name" id="displayName">ヤマダタロウ</p>
          <p class="member-role" id="displayRole">メンバー</p>
        </div>
        <div class="right-bottom">
          <div class="bottom-item">
            <span class="bottom-label">JOINED</span>
            <span class="bottom-value" id="displayJoined">2025.04.01</span>
          </div>
          <div class="bottom-item" style="text-align:right">
            <span class="bottom-label">TIME</span>
            <span class="clock-value" id="clockDisplay">--:--:--</span>
          </div>
        </div>
      </div>
    </div>
    <button class="logout-btn" onclick="doLogout()">ログアウト</button>
  </div>

  <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbz7SxxyF2v6a76VDyZaSYLModBLe5ExwEjNTX5gqtCBQmgUTiA3SpFsar-fh_6TBPIsqg/exec';

    async function doLogin() {
      const name = document.getElementById('nameInput').value.trim();
      const pass = document.getElementById('passInput').value.trim();
      const errEl = document.getElementById('errorMsg');

      if (!name || !pass) {
        errEl.textContent = '名前とパスワードを入力してください';
        return;
      }
      errEl.textContent = '確認中…';

      const callbackName = 'cb_' + Date.now();
      const url = GAS_URL + '?callback=' + callbackName + '&name=' + encodeURIComponent(name) + '&password=' + encodeURIComponent(pass);

      const script = document.createElement('script');
      script.src = url;

      window[callbackName] = function(data) {
        delete window[callbackName];
        document.body.removeChild(script);
        if (data.success) {
          showCard(data);
        } else {
          errEl.textContent = '名前またはパスワードが違います';
        }
      };

      script.onerror = function() {
        errEl.textContent = 'エラーが発生しました。もう一度試してください。';
      };

      document.body.appendChild(script);
    }

    function showCard(data) {
      const nameEl = document.getElementById('displayName');
      nameEl.textContent = data.name;
      const len = data.name.length;
      nameEl.style.fontSize = len <= 8 ? '24px' : len <= 11 ? '19px' : '16px';

      document.getElementById('displayRole').textContent = data.role;
      document.getElementById('displayId').textContent = 'NO. ' + data.member_id;

      const d = new Date(data.joined_date);
      const fmt = d.getFullYear() + '.' +
        String(d.getMonth() + 1).padStart(2, '0') + '.' +
        String(d.getDate()).padStart(2, '0');
      document.getElementById('displayJoined').textContent = fmt;

      document.getElementById('loginWrap').style.display = 'none';
      document.getElementById('cardWrap').classList.add('card-visible');
    }

    function doLogout() {
      document.getElementById('nameInput').value = '';
      document.getElementById('passInput').value = '';
      document.getElementById('errorMsg').textContent = '';
      document.getElementById('loginWrap').style.display = 'block';
      document.getElementById('cardWrap').classList.remove('card-visible');
    }

    function updateClock() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      const s = String(now.getSeconds()).padStart(2, '0');
      document.getElementById('clockDisplay').textContent = h + ':' + m + ':' + s;
    }

    setInterval(updateClock, 1000);
    updateClock();

    document.getElementById('passInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });
  </script>
</body>
</html>
